<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบติดตามเครื่องโน๊ตบุ๊ค วิชาการ</title>
    <meta name="description" content="Real-time Device Monitoring System - ระบบติดตามสถานะเครื่องโน๊ตบุ๊คแบบเรียลไทม์">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kiosk Monitor">
    <meta name="application-name" content="Kiosk Monitor">
    <meta name="msapplication-TileColor" content="#0f172a">
    <meta name="msapplication-TileImage" content="icons/icon-144x144.png">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css?v=3">
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="logo.png">
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192x192.png">
    <!-- PWA Icons -->
    <link rel="icon" sizes="192x192" href="icons/icon-192x192.png">
    <link rel="icon" sizes="512x512" href="icons/icon-512x512.png">
</head>
<body>
    <div class="app-container">
        <!-- Header Section -->
        <header class="header glass-panel">
            <div class="header-left">
                <div class="logo-box">
                    <img src="logo.png" alt="Kiosk Logo" class="app-logo">
                </div>
                <div>
                    <h1>ระบบติดตามเครื่องโน๊ตบุ๊ค วิชาการ</h1>
                    <p class="subtitle">Real-time Device Monitoring System</p>
                </div>
            </div>
            
            <div class="header-stats">
                <div class="stat-card">
                    <div class="stat-value" id="total-machines">0</div>
                    <div class="stat-label">Total Kiosks</div>
                </div>
                <div class="stat-card active-stat">
                    <div class="stat-value" id="active-machines">0</div>
                    <div class="stat-label">In Use</div>
                </div>
            </div>

            <div class="header-right">
                <div class="refresh-indicator">
                    <span class="pulse-dot"></span>
                    <span id="last-update">Updating...</span>
                </div>
                <button id="force-refresh-btn" class="btn-refresh" title="Refresh Now">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
                <button id="menu-toggle-btn" class="btn-menu" title="Recent Activity">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-layout">
            <!-- Machine Grid -->
            <main class="machines-container">
                <div class="section-header">
                    <h2><i class="fa-solid fa-server"></i> Terminal Status</h2>
                    <div class="filter-controls">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="in-use">In Use</button>
                        <button class="filter-btn" data-filter="available">Available</button>
                    </div>
                </div>
                
                <!-- Loading State -->
                <div id="loading-state" class="loading-state">
                    <div class="spinner"></div>
                    <p>Fetching real-time data from Google Sheets...</p>
                </div>

                <!-- Grid -->
                <div id="machines-grid" class="machines-grid">
                    <!-- Cards will be injected here by JS -->
                </div>
            </main>

            <!-- Sidebar / Recent Logs -->
            <aside class="sidebar glass-panel">
                <div class="section-header">
                    <h2><i class="fa-solid fa-clock-rotate-left"></i> Recent Activity</h2>
                    <button id="close-sidebar-btn" class="btn-close-sidebar" title="Close">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div id="activity-feed" class="activity-feed">
                    <!-- Logs injected here -->
                </div>
            </aside>
        </div>
    </div>

    <!-- Template for Machine Card (Hidden) -->
    <template id="machine-card-template">
        <div class="machine-card glass-panel">
            <div class="card-header">
                <h3 class="machine-name">PC-01</h3>
                <span class="status-badge">Available</span>
            </div>
            <div class="card-body">
                <div class="info-row user-info">
                    <i class="fa-solid fa-user"></i>
                    <span class="user-name">-</span>
                </div>
                <div class="info-row time-info">
                    <i class="fa-regular fa-clock"></i>
                    <span class="last-action-time">-</span>
                </div>
                <div class="info-row detail-info">
                    <i class="fa-solid fa-circle-info"></i>
                    <span class="action-detail">-</span>
                </div>
            </div>
            <div class="card-footer">
                <span class="action-type">Logout</span>
                <div class="action-buttons">
                    <button class="btn-card-clear" title="Clear Session" style="display: none;">
                        <i class="fa-solid fa-rotate-left"></i> Clear
                    </button>
                    <button class="btn-card-shutdown" title="Remote Shutdown" style="display: none;">
                        <i class="fa-solid fa-power-off"></i> Shutdown
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- Custom Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Custom Glassmorphic Modal -->
    <div id="custom-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <i class="fa-solid fa-circle-question modal-icon"></i>
                <h3 id="modal-title">ยืนยันการทำรายการ</h3>
            </div>
            <div class="modal-body">
                <p id="modal-message">คุณต้องการยืนยันการทำรายการนี้ใช่หรือไม่?</p>
            </div>
            <div class="modal-footer">
                <button id="modal-btn-cancel" class="btn-modal-cancel">ยกเลิก</button>
                <button id="modal-btn-confirm" class="btn-modal-confirm">ยืนยัน</button>
            </div>
        </div>
    </div>

    <script src="app.js?v=5"></script>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('[PWA] Service Worker registered with scope:', registration.scope);
                        
                        // Check for updates
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'activated') {
                                    // Show update notification
                                    if (typeof showToast === 'function') {
                                        showToast('แอปอัปเดตเวอร์ชั่นใหม่แล้ว!', 'success');
                                    }
                                }
                            });
                        });
                    })
                    .catch((error) => {
                        console.error('[PWA] Service Worker registration failed:', error);
                    });
            });
        }
    </script>

    <!-- PWA Install Prompt -->
    <div id="pwa-install-banner" class="pwa-install-banner" style="display: none;">
        <div class="pwa-install-content">
            <i class="fa-solid fa-download pwa-install-icon"></i>
            <div class="pwa-install-text">
                <strong>ติดตั้งแอป</strong>
                <span>เพิ่ม Kiosk Monitor ไว้ที่หน้าจอหลัก</span>
            </div>
        </div>
        <div class="pwa-install-actions">
            <button id="pwa-install-btn" class="pwa-btn-install">ติดตั้ง</button>
            <button id="pwa-dismiss-btn" class="pwa-btn-dismiss">ไม่ตอนนี้</button>
        </div>
    </div>

    <script>
        // PWA Install prompt handler
        let deferredPrompt;
        const installBanner = document.getElementById('pwa-install-banner');
        const installBtn = document.getElementById('pwa-install-btn');
        const dismissBtn = document.getElementById('pwa-dismiss-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // Check if user dismissed before
            const dismissed = localStorage.getItem('pwa-install-dismissed');
            if (!dismissed) {
                installBanner.style.display = 'flex';
                setTimeout(() => installBanner.classList.add('show'), 100);
            }
        });

        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    console.log('[PWA] Install outcome:', outcome);
                    deferredPrompt = null;
                }
                installBanner.classList.remove('show');
                setTimeout(() => installBanner.style.display = 'none', 300);
            });
        }

        if (dismissBtn) {
            dismissBtn.addEventListener('click', () => {
                installBanner.classList.remove('show');
                setTimeout(() => installBanner.style.display = 'none', 300);
                localStorage.setItem('pwa-install-dismissed', 'true');
            });
        }

        window.addEventListener('appinstalled', () => {
            console.log('[PWA] App installed successfully!');
            installBanner.classList.remove('show');
            setTimeout(() => installBanner.style.display = 'none', 300);
            if (typeof showToast === 'function') {
                showToast('ติดตั้งแอปสำเร็จ! 🎉', 'success');
            }
        });
    </script>
</body>
</html>
